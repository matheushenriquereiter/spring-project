<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register User</title>
</head>
<body>

<h1>Register User</h1>
<form role="form" method="POST" th:action="@{/register}" th:object="${registrationForm}">

    <label for="name">Name:
        <input type="text" id="name" required th:field="*{name}">
    </label>
    <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>

    <br>

    <label for="email">Email:
        <input type="email" id="email" required th:field="*{email}">
    </label>
    <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>

    <br>

    <label for="password">Password:
        <input type="password" id="password" required th:field="*{password}">
    </label>
    <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>

    <br>

    <button type="submit">Submit</button>

    <br>

    <a th:href="@{/login}">Already have an account?</a>
</form>

</body>
</html>
