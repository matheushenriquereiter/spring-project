<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>All Users</title>
</head>
<body>

<h1>Users</h1>
<p th:each="user : ${users}" th:object="${user}">
    <span th:text="*{id}"></span>
    <span th:text="*{name}"></span>
    <span th:text="*{email}"></span>
    <span th:text="*{password}"></span>
</p>

</body>
</html>
